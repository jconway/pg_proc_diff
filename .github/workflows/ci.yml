name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # catalog.py imports psycopg2 at module level, so it is required even
        # though the integration tests are skipped without PGPROCDIFF_TEST_DSN.
        run: pip install psycopg2-binary

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  integration:
    name: Integration tests (PostgreSQL ${{ matrix.pg-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg-version: ['16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # The integration test toggles template0.datallowconn, which requires a
        # superuser. The default 'postgres' role in this image is a superuser.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run full suite (unit + integration)
        # DSN must be keyword/value form; catalog re-targets to dbname=template0
        # and rejects URI-form conninfo.
        env:
          PGPROCDIFF_TEST_DSN: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
        run: python -m unittest discover -s tests -v
